volumes:
  n8n_storage:
  postgres_storage:
  ollama_storage:
  qdrant_storage:
  docling_data:

networks:
  backend:
    # Keep container-to-container traffic isolated from external networks by default.
    internal: true
  edge:
    # Host-facing ports stay loopback-bound unless a port binding overrides this intentionally.
    driver: bridge
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: "127.0.0.1"

x-n8n: &service-n8n
  image: n8nio/n8n:2.13.4@sha256:ab216dc8d10d1940a07f41f04355011ab03d0dec1fc03d62d5db3fc1bad815f5
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_VERSION_NOTIFICATIONS_ENABLED=false
    - N8N_TEMPLATES_ENABLED=false
    - EXTERNAL_FRONTEND_HOOKS_URLS=
    - N8N_DIAGNOSTICS_CONFIG_FRONTEND=
    - N8N_DIAGNOSTICS_CONFIG_BACKEND=
    - N8N_COMMUNITY_PACKAGES_ENABLED=false
    - N8N_UNVERIFIED_PACKAGES_ENABLED=false
    - N8N_VERIFIED_PACKAGES_ENABLED=false
    - N8N_ENCRYPTION_KEY
    - N8N_USER_MANAGEMENT_JWT_SECRET
    - OLLAMA_HOST=${OLLAMA_HOST:-ollama:11434}
    - N8N_RESTRICT_FILE_ACCESS_TO=/data/shared
  env_file:
    - path: .env
      required: true

x-ollama: &service-ollama
  image: ollama/ollama:0.19.0-rc0@sha256:ff17815f73e64408bbd723bb8e570770dfb612238e59e4c9bc5832ec7928df82
  container_name: ollama
  networks:
    backend:
      gw_priority: 1
      aliases:
        - ollama
    edge:
  restart: unless-stopped
  ports:
    - "${LOCAL_BIND_ADDRESS:-127.0.0.1}:11434:11434"
  volumes:
    - ollama_storage:/root/.ollama

# ===========================================
# Docling Base Configuration (YAML Anchor)
# ===========================================
x-docling: &service-docling
  image: ghcr.io/docling-project/docling-serve:main@sha256:602777945860ba49c27181b72c90294e7fc3fa4a7facb2165f50a8254422d6a6
  container_name: docling
  networks:
    backend:
      gw_priority: 1
      aliases:
        - docling
    edge:
  restart: unless-stopped
  # Run as root to fix bind mount permissions on Windows
  user: root
  # Override working directory so referenced images are saved to shared folder
  working_dir: /shared/docling-scratch
  expose:
    - 5001/tcp
  ports:
    - "${LOCAL_BIND_ADDRESS:-127.0.0.1}:5001:5001"
  environment:
    - DOCLING_SERVE_ENABLE_UI=true
    # Store extracted images in shared folder accessible by other services
    - DOCLING_SERVE_SCRATCH_PATH=/shared/docling-scratch
    # Keep results after retrieval so other services can access them
    - DOCLING_SERVE_SINGLE_USE_RESULTS=false
    # Gradio security: allow writing to /shared directory
    - GRADIO_ALLOWED_PATHS=/shared
    - GRADIO_TEMP_DIR=/shared/docling-scratch
    - DOCLING_SERVE_ENABLE_REMOTE_SERVICES=false
    - DOCLING_SERVE_ALLOW_EXTERNAL_PLUGINS=false
    - DOCLING_SERVE_ALLOW_CUSTOM_VLM_CONFIG=false
    - DOCLING_SERVE_ALLOW_CUSTOM_PICTURE_DESCRIPTION_CONFIG=false
    - DOCLING_SERVE_ALLOW_CUSTOM_CODE_FORMULA_CONFIG=false
    - DOCLING_SERVE_ENABLE_MANAGEMENT_ENDPOINTS=false
    - DOCLING_SERVE_SHOW_VERSION_INFO=false
    - DOCLING_SERVE_OTEL_ENABLE_TRACES=false
    - DOCLING_SERVE_OTEL_ENABLE_OTLP_METRICS=false
    - OTEL_EXPORTER_OTLP_ENDPOINT=
  volumes:
    - docling_data:/data
    - ./shared:/shared
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s

services:
  postgres:
    image: postgres:16.13-alpine3.23@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    hostname: postgres
    networks:
      backend:
    restart: unless-stopped
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n-import:
    <<: *service-n8n
    hostname: n8n-import
    container_name: n8n-import
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        # Only import if not already done (check marker file)
        if [ -f /demo-data/.imported ]; then
          echo "Demo data already imported - skipping"
        else
          echo "First run detected - importing demo data..."
          n8n import:credentials --separate --input=/demo-data/credentials
          n8n import:workflow --separate --input=/demo-data/workflows
          touch /demo-data/.imported
          echo "Import complete"
        fi
    volumes:
      - ./n8n/demo-data:/demo-data
    networks:
      backend:
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    <<: *service-n8n
    hostname: n8n
    container_name: n8n
    restart: unless-stopped
    # Run as root to access shared files created by Docling (also running as root)
    user: root
    networks:
      backend:
        gw_priority: 1
      edge:
    ports:
      - "${LOCAL_BIND_ADDRESS:-127.0.0.1}:5678:5678"
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/demo-data:/demo-data
      - ./shared:/data/shared
      - ./shared/rag-files:/data/rag-files
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully

  qdrant:
    image: qdrant/qdrant:v1.17.1@sha256:94728574965d17c6485dd361aa3c0818b325b9016dac5ea6afec7b4b2700865f
    hostname: qdrant
    container_name: qdrant
    networks:
      backend:
        gw_priority: 1
      edge:
    restart: unless-stopped
    environment:
      - QDRANT__TELEMETRY_DISABLED=true
    ports:
      - "${LOCAL_BIND_ADDRESS:-127.0.0.1}:6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  # ===========================================
  # Admo - ServiceNow XML Processing
  # ===========================================
  # Optional local microservice for ServiceNow XML intake and normalization.
  # Accessible at http://localhost:${ADMO_PORT:-8000}
  # Uses profile: admo
  admo:
    profiles: ["admo"]
    build:
      context: ${ADMO_REPO_PATH:-../Admo}
    hostname: admo
    container_name: admo
    networks:
      backend:
        gw_priority: 1
      edge:
    restart: unless-stopped
    ports:
      - "${LOCAL_BIND_ADDRESS:-127.0.0.1}:${ADMO_PORT:-8000}:8000"
    environment:
      - KNOWLEDGE_PROJECT_ROOT=/knowledge
      - ALLOW_NETWORK=false
      - RETRIEVAL_MODE=local_only
      - VECTOR_DB_BACKEND=qdrant_local
      - VECTOR_DB_PATH=/knowledge/index/qdrant
      - QDRANT_COLLECTION=${ADMO_QDRANT_COLLECTION:-admo_servicenow_xml}
      - RETRIEVAL_PAYLOAD_PATH=/knowledge/retrieval/payloads/qdrant
      - RETRIEVAL_PAYLOAD_FORMAT=qdrant_points_v1
      - RETRIEVAL_CONFIG_PATH=/knowledge/retrieval/configs
      - RETRIEVAL_REPORT_PATH=/knowledge/retrieval/reports
    volumes:
      - ${ADMO_KNOWLEDGE_ROOT:-../Admo-Knowledge-Project}:/knowledge
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ===========================================
  # Static File Server - Serves shared folder
  # ===========================================
  # Access files at http://localhost:8080/
  # Example: http://localhost:8080/extracted-images/image_xxx.png
  static-files:
    image: nginx:1.29.7-alpine@sha256:e7257f1ef28ba17cf7c248cb8ccf6f0c6e0228ab9c315c152f9c203cd34cf6d1
    hostname: static-files
    container_name: static-files
    networks:
      backend:
        gw_priority: 1
      edge:
    restart: unless-stopped
    ports:
      - "${LOCAL_BIND_ADDRESS:-127.0.0.1}:8080:80"
    volumes:
      - ./shared/extracted-images:/usr/share/nginx/html:ro
    command: |
      sh -c "echo 'server {
        listen 80;
        root /usr/share/nginx/html;
        index chat.html;
        autoindex on;
        location / {
          try_files \$$uri \$$uri/ =404;
        }
      }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  ollama-cpu:
    profiles: ["cpu"]
    <<: *service-ollama

  ollama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *service-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-gpu-amd:
    profiles: ["gpu-amd"]
    <<: *service-ollama
    image: ollama/ollama:0.19.0-rc0-rocm@sha256:712e4b2fb26840eb4c5cca0cb0068f67b1952cfc756a2a4e3e990ed45efa1c84
    devices:
      - "/dev/kfd"
      - "/dev/dri"

  # ===========================================
  # Docling - Document Processing
  # ===========================================
  # OCR and document parsing service
  # Accessible at http://localhost:5001
  # Uses profiles: docling, cpu, gpu-nvidia, gpu-amd
  # Docs: https://github.com/docling-project/docling-serve

  docling-cpu:
    profiles: ["docling", "cpu"]
    <<: *service-docling

  docling-gpu:
    profiles: ["gpu-nvidia"]
    <<: *service-docling
    image: ghcr.io/docling-project/docling-serve-cu126:main@sha256:01521110609f51f20ba87b96464a49dfc797eddcb6423da92036aa10ec5b1873
    environment:
      - DOCLING_SERVE_ENABLE_UI=true
      - DOCLING_SERVE_SCRATCH_PATH=/shared/docling-scratch
      - DOCLING_SERVE_SINGLE_USE_RESULTS=false
      - GRADIO_ALLOWED_PATHS=/shared
      - GRADIO_TEMP_DIR=/shared/docling-scratch
      - DOCLING_SERVE_ENABLE_REMOTE_SERVICES=false
      - DOCLING_SERVE_ALLOW_EXTERNAL_PLUGINS=false
      - DOCLING_SERVE_ALLOW_CUSTOM_VLM_CONFIG=false
      - DOCLING_SERVE_ALLOW_CUSTOM_PICTURE_DESCRIPTION_CONFIG=false
      - DOCLING_SERVE_ALLOW_CUSTOM_CODE_FORMULA_CONFIG=false
      - DOCLING_SERVE_ENABLE_MANAGEMENT_ENDPOINTS=false
      - DOCLING_SERVE_SHOW_VERSION_INFO=false
      - DOCLING_SERVE_OTEL_ENABLE_TRACES=false
      - DOCLING_SERVE_OTEL_ENABLE_OTLP_METRICS=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=
      - NVIDIA_VISIBLE_DEVICES=all
    runtime: nvidia

  docling-gpu-amd:
    profiles: ["gpu-amd"]
    <<: *service-docling
    image: ghcr.io/docling-project/docling-serve-rocm:main
    environment:
      - DOCLING_SERVE_ENABLE_UI=true
      - DOCLING_SERVE_SCRATCH_PATH=/shared/docling-scratch
      - DOCLING_SERVE_SINGLE_USE_RESULTS=false
      - GRADIO_ALLOWED_PATHS=/shared
      - GRADIO_TEMP_DIR=/shared/docling-scratch
      - DOCLING_SERVE_ENABLE_REMOTE_SERVICES=false
      - DOCLING_SERVE_ALLOW_EXTERNAL_PLUGINS=false
      - DOCLING_SERVE_ALLOW_CUSTOM_VLM_CONFIG=false
      - DOCLING_SERVE_ALLOW_CUSTOM_PICTURE_DESCRIPTION_CONFIG=false
      - DOCLING_SERVE_ALLOW_CUSTOM_CODE_FORMULA_CONFIG=false
      - DOCLING_SERVE_ENABLE_MANAGEMENT_ENDPOINTS=false
      - DOCLING_SERVE_SHOW_VERSION_INFO=false
      - DOCLING_SERVE_OTEL_ENABLE_TRACES=false
      - DOCLING_SERVE_OTEL_ENABLE_OTLP_METRICS=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=
      - ROCR_VISIBLE_DEVICES=0
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - 44    # video group GID (run: getent group video)
      - 109   # render group GID (run: getent group render)
